tsn flow meter 1
 cbs 200000
 eir 100000
 ebs 2000000

tsn stream filter 1
 stream-id 1
 flow-meter id 1
 max-sdu 20000
tsn stream filter 2
 stream-id 2
 max-sdu 20000
