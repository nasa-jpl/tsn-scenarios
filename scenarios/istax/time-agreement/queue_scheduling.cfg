{% import "vlan.vars" as vlans %}

# Use Qos Control List to set the ingress/egress queue mapping
# Queue is the highest priority and queue 0 is the lowest
# We will use the convention:
#   Port 1 -> Queue 4
#   Port 2 -> Queue 5
#   Port 3 -> Queue 6
#   Port 4 -> Queue 7
{% for port in ports[:4] %}
qos qce {{ loop.index }} interface {{ port.name }} tag vid {{ vlans.tagp }} action cos {{ loop.index + 3 }}
{% endfor %}

# Because the microchip switch design does not allow you to create a DWRR port schedule
# on the upper queues only, we need to include all queues in the DWRR schedule, and give
# the highest weight to our high priority time sync queues
{% for port in ports[:4] %}
interface {{ port.name }}
  qos wrr 1 1 1 1 24 24 24 24
{% endfor %}
