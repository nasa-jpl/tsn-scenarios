{% import "vlan.vars" as vlans %}
{% import "time-agreement/macs.vars" as macs %}
{% import "time-agreement/ips.vars" as ips %}
{% include "base.cfg" %}

# For now, we override the DHCP setting until we have that working in the testbed
interface vlan {{ vlans.mgmt }}
 ip address dhcp fallback {{ ips.node4 }} 255.255.255.0 timeout 20

# Set ports types to hybrid and set VLANs. We want a star topology for
# VLAN 1 to try and prevent multicast storms on the management VLAN
interface {{ ports[0].name }}
 switchport hybrid allowed vlan 1,10
 switchport mode hybrid
interface {{ ports[1].name }}
 switchport hybrid allowed vlan 10
 switchport mode hybrid
interface {{ ports[2].name }}
 switchport hybrid allowed vlan 10
 switchport mode hybrid
interface {{ ports[3].name }}
 switchport hybrid allowed vlan 1,10
 switchport mode hybrid

# The ordering of the ACE is important. As they are added, they get appended to the list
# and are executed in that order. So you need to make sure the DENY ALL is the LAST thing, otherwise
# you will lose your connection to the switch midway through. The numbers themselves are merely
# labels and do not imply anything about order

# Time sync packets sourced from node 1
# Directly from switch 1, send to all others
# Via other switch, send to my own node only
{% set node1_src =
   [
   'ingress interface ' ~ ports[0].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw1 ~ ' action deny redirect interface ' ~ ports[1].name ~ ',3,4',
   'ingress interface ' ~ ports[1].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw1 ~ ' action deny redirect interface ' ~ ports[3].name,
   'ingress interface ' ~ ports[2].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw1 ~ ' action deny redirect interface ' ~ ports[3].name
   ]
%}

# Time sync packets sourced from node 2
# Directly from switch 2, send to all others
# Via other switch, send to my own node only
{% set node2_src =
   [
   'ingress interface ' ~ ports[0].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw2 ~ ' action deny redirect interface ' ~ ports[3].name,
   'ingress interface ' ~ ports[1].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw2 ~ ' action deny redirect interface ' ~ ports[0].name ~ ',3,4',
   'ingress interface ' ~ ports[2].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw2 ~ ' action deny redirect interface ' ~ ports[3].name
   ]
%}

# Time sync packets sourced from node 3
# From my own node, send to all others
{% set node3_src =
   [
   'ingress interface ' ~ ports[0].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw3 ~ ' action deny redirect interface ' ~ ports[3].name,
   'ingress interface ' ~ ports[1].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw3 ~ ' action deny redirect interface ' ~ ports[3].name,
   'ingress interface ' ~ ports[2].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw3 ~ ' action deny redirect interface ' ~ ports[0].name ~ ',2,4',
   ]
%}

# Time sync packets sourced from node 4
# Directly from switch 4, send to all others
# Via other switch, send to my own node only
{% set node4_src =
   [
   'ingress interface ' ~ ports[3].name ~ ' tag tagged vid ' ~ vlans.tagp ~ ' frame-type etype smac ' ~ macs.sw4 ~ ' action deny redirect interface ' ~ ports[0].name ~ ',2,3'
   ]
%}

# Combine time sync ACEs
{% set time_sync_ace_list = node1_src + node2_src + node3_src + node4_src %}

# Only allow ARP requests from my own node, and management interface
# Allow management web interface traffic
{% set mgmt_ace_list =
   [
   'ingress interface ' ~ ports[3].name ~ ',25 frame-type arp action permit',
   'frame-type ipv4-tcp dport 80 action permit'
   ]
%}


# Fallback to deny all - THIS MUST BE LAST
{% set default_ace_list =
   ['action deny']
%}

# Combine all ACEs before applying
{% set ace_list = time_sync_ace_list + mgmt_ace_list + default_ace_list %}
{% for ace in ace_list %}
access-list ace {{ loop.index }} {{ ace }}
{% endfor %}

# ingress queue configuration
{% include "time-agreement/ingress_vlan_4cos.cfg" %}

# egress queue configuration
{% include "time-agreement/egress_8q_dwrr.cfg" %}
