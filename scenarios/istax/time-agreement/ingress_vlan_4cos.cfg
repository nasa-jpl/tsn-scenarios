{% import "vlan.vars" as vlans %}

# Use Qos Control List to set the ingress/egress queue mapping
# Queue is the highest priority and queue 0 is the lowest
# We will use the convention:
#   Port 1 -> Queue 4
#   Port 2 -> Queue 5
#   Port 3 -> Queue 6
#   Port 4 -> Queue 7
{% for port in ports[:4] %}
qos qce {{ loop.index }} interface {{ port.name }} tag vid {{ vlans.tagp }} action cos {{ loop.index + 3 }}
{% endfor %}
