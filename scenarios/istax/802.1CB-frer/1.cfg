{% include "base.cfg" %}

# This implements 802.1CB generation (a.k.a., Frame Replication) using the MAC
# address table forwarding method as described in AN1185 TSN Configuration
# Guide section 9.1.2 and example 9.3.2.
{% set listener = "02:00:00:00:00:02" %}

mac address-table static {{ listener }} vlan 2 interface {{ ports[1].name }} {{ ports[2].name }}

stream 1
 dmac {{ listener }}
!

tsn frer 1
 mode generation
 ingress stream-id-list 1
 frer-vlan 2
 egress interface {{ ports[1].name }}-3
 admin-state enable
!
