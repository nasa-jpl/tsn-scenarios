{% import "vlan.vars" as vlans %}
{% include "base.cfg" %}

# This implements 802.1CB generation (a.k.a., Frame Replication) using the MAC
# address table forwarding method as described in AN1185 TSN Configuration
# Guide [1] section 9.1.2 and example 9.3.2 Switch A.
#
# [1]: https://www.microchip.com/content/dam/mchp/documents/UNG/ApplicationNotes/ApplicationNotes/AN1185-SW_Configuration_Guide_TSN.pdf

{% set frer_listener = "02:00:00:00:00:02" %}
{% set nonfrer_listener = "02:00:00:00:00:03" %}

vlan {{ vlans.frer }}
 name FRER
 no flooding

mac address-table static {{ nonfrer_listener }} vlan {{ vlans.tsn }} interface {{ ports[1].name }}
mac address-table static {{ frer_listener }} vlan {{ vlans.frer }} interface {{ ports[1].name }} {{ ports[2].name }}

stream 1
 dmac {{ frer_listener }}

tsn frer 1
 mode generation
 ingress stream-id-list 1
 frer-vlan {{ vlans.frer }}
 egress interface {{ ports[1].name }} {{ ports[2].name }}
 admin-state enable

interface {{ ports[0].name }}
 switchport mode hybrid
 switchport hybrid native vlan {{ vlans.tsn }}
 switchport hybrid allowed vlan none
 # switchport trunk native vlan 2
 # switchport trunk allowed vlan 2,3
 stream-id 1


{% for port in ports[1:3] %}
interface {{ port.name }}
 switchport mode trunk
 switchport trunk native vlan {{ vlans.tsn }}
 switchport trunk allowed vlan {{ vlans.tsn }},{{ vlans.frer }}
 # switchport hybrid native vlan 2
 # switchport hybrid allowed vlan 2,3
 # switchport hybrid ingress-filtering
{% endfor %}
