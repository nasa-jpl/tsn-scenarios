{% include "base.cfg" %}

vlan 2
 flooding
!

stream 1
 ipv4 proto udp dport 3300
!
stream 2
 ipv4 sip 100.1.0.1/32 proto udp
!
stream 3
 ipv4 dip 100.1.0.4/32 proto udp dport 1000
!
stream 4
 ipv4 dip 100.1.0.4/32 proto udp dport 4000-4400
!
stream 5
 ipv4 sip 100.1.0.2/32 dip 100.1.0.3/32 proto udp dport 3000
!
stream 6
 ipv4 sip 100.1.0.0/24 dip 100.1.0.0/24
!

{% for port in ports[0:2] %}
interface {{ port.name }}
 stream-id 1
 stream-id 2
 stream-id 3
 stream-id 4
 stream-id 5
 stream-id 6
!
{% endfor %}
!
tsn flow meter 1
 cir 1000
!
tsn flow meter 2
 cir 2000
!
tsn flow meter 3
 cir 3000
!
tsn flow meter 4
 cir 4000
!
tsn flow meter 5
 cir 5000
!
tsn flow meter 6
 cir 0
!
tsn stream filter 1
 stream-id 1
 flow-meter id 1
!
tsn stream filter 2
 stream-id 2
 flow-meter id 2
!
tsn stream filter 3
 stream-id 3
 flow-meter id 3
!
tsn stream filter 4
 stream-id 4
 flow-meter id 4
!
tsn stream filter 5
 stream-id 5
 flow-meter id 5
!
tsn stream filter 6
 stream-id 6
 flow-meter id 6
!
