{% import "vlan.vars" as vlans %}
{% include "base.cfg" %}
{% include "802.1AS/common.cfg" %}

# Use trunk ports so that PCP field is forwarded for non-native VLAN tagged frames
{% for port in ports[:3] %}
interface {{ port.name }}
 switchport trunk native vlan {{ vlans.as }}
 switchport trunk allowed vlan {{ vlans.tsn }}
 switchport mode trunk
{% endfor %}

# Static MAC table entries
mac address-table static 02:00:00:00:00:01 vlan {{ vlans.tsn }} interface {{ ports[0].name }}
mac address-table static 02:00:00:00:00:02 vlan {{ vlans.tsn }} interface {{ ports[1].name }}
mac address-table static 02:00:00:00:00:03 vlan {{ vlans.tsn }} interface {{ ports[2].name }}

interface {{ ports[0].name }}
 qos trust tag
interface {{ ports[1].name }}
 qos trust tag
interface {{ ports[2].name }}
 tsn tas cycle-time 1 ms
 tsn tas control-list-length 2
 # Allow queue 7 in all windows for 802.1AS traffic
 tsn tas control-list index 0 gate-state queue 2,7 open time-interval 500000
 tsn tas control-list index 1 gate-state queue 3,7 open time-interval 500000
 tsn tas gate-enabled
 tsn tas config-change
