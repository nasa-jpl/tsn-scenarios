{% include "base.cfg" %}
{% include "802.1AS/common.cfg" %}

{% set talker2 = "00:15:01:00:00:01" %}

stream 1
!
stream 2
 smac {{talker2}}
!
interface {{ ports[0].name }}
 stream-id 1
!
interface {{ ports[1].name }}
 stream-id 2
!
tsn stream gate 1
 ipv 1
 cycle-time 1 ms
 control-list-length 4
 control-list index 0 gate-state open time-interval 250 us ipv 4
 control-list index 1 gate-state open time-interval 250 us ipv 5
 control-list index 2 gate-state open time-interval 250 us ipv 6
 control-list index 3 gate-state open time-interval 250 us ipv 7
 enable
 config-change
!
tsn stream gate 2
 ipv 2
 cycle-time 1 ms
 control-list-length 4
 control-list index 0 gate-state closed time-interval 500 us ipv 2 octet-max 511
 control-list index 1 gate-state open time-interval 25 us ipv 3 octet-max 511
 control-list index 2 gate-state closed time-interval 474 us ipv 2 octet-max 511
 control-list index 3 gate-state closed time-interval 1 us ipv 2 octet-max 511
 enable
 config-change
!
tsn stream filter 1
 stream-id 1
 gate id 1
 max-sdu 1536
!
tsn stream filter 2
 stream-id 2
 gate id 2
 max-sdu 1536
!
