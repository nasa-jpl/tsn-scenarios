{% include "base.cfg" %}
{% include "802.1AS.cfg" %}

!
monitor session 1 source interface 10GigabitEthernet 1/1,8 both
monitor session 1 destination interface 10GigabitEthernet 1/6
monitor session 1
mac address-table static 00:a9:00:00:05:05 vlan 2 interface 10GigabitEthernet 1/2
spanning-tree mst name 00-04-a3-01-00-00 revision 0
!
!
{% set talker2 = "00:15:01:00:00:01" %}

stream 1
!
stream 2
 smac {{talker2}}
!
!
{% for port in ports[0:1] %}
interface {{ port.name }}
 switchport access vlan 2
 stream-id 1
 qos trust tag
 qos map tag-cos pcp 0 dei 0 cos 0 dpl 0
 qos map tag-cos pcp 0 dei 1 cos 0 dpl 1
 qos map tag-cos pcp 1 dei 0 cos 1 dpl 0
 qos map tag-cos pcp 1 dei 1 cos 1 dpl 1
 no spanning-tree
{% endfor %}
!
!
{% for port in ports[1:2] %}
interface {{ port.name }}
 switchport access vlan 2
 stream-id 2
 qos trust tag
 qos map tag-cos pcp 0 dei 0 cos 0 dpl 0
 qos map tag-cos pcp 0 dei 1 cos 0 dpl 1
 qos map tag-cos pcp 1 dei 0 cos 1 dpl 0
 qos map tag-cos pcp 1 dei 1 cos 1 dpl 1
 no spanning-tree
{% endfor %}
!
{% for port in ports[2:4] %}
interface {{ port.name }}
 switchport access vlan 2
 qos trust tag
 qos map tag-cos pcp 0 dei 0 cos 0 dpl 0
 qos map tag-cos pcp 0 dei 1 cos 0 dpl 1
 qos map tag-cos pcp 1 dei 0 cos 1 dpl 0
 qos map tag-cos pcp 1 dei 1 cos 1 dpl 1
 no spanning-tree
{% endfor %}
!
!
{% for port in ports[5:6] %}
interface {{ port.name }}
 switchport access vlan 200
 no mac address-table learning
 no spanning-tree
{% endfor %}
!
!
{% for port in ports[7:8] %}
interface {{ port.name }}
 switchport access vlan 200
 no mac address-table learning
 no spanning-tree
{% endfor %}
!
!
{% for port in ports[11:12] %}
interface {{ port.name }}
 switchport access vlan 2
{% endfor %}
!
interface vlan 1
 ip address dhcp fallback 192.0.2.1 255.255.255.0 timeout 60
!
spanning-tree aggregation
 spanning-tree link-type point-to-point
!
!
tsn stream gate 1
 ipv 1
 cycle-time 1 ms
 control-list-length 4
 control-list index 0 gate-state open time-interval 250 us ipv 4
 control-list index 1 gate-state open time-interval 250 us ipv 5
 control-list index 2 gate-state open time-interval 250 us ipv 6
 control-list index 3 gate-state open time-interval 250 us ipv 7
 enable
 config-change
!
tsn stream gate 2
 ipv 2
 cycle-time 1 ms
 control-list-length 4
 control-list index 0 gate-state closed time-interval 500 us ipv 2 octet-max 511
 control-list index 1 gate-state open time-interval 25 us ipv 3 octet-max 511
 control-list index 2 gate-state closed time-interval 474 us ipv 2 octet-max 511
 control-list index 3 gate-state closed time-interval 1 us ipv 2 octet-max 511
 enable
 config-change
!
tsn stream filter 1
 stream-id 1
 gate id 1
 max-sdu 1536
!
tsn stream filter 2
 stream-id 2
 gate id 2
 max-sdu 1536
!