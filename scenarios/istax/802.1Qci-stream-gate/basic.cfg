{% include "base.cfg" %}
{% include "802.1AS/common.cfg" %}

# This configuration implements 802.1Qci (PSFP stream gating) using
# the source MAC address for stream identification with two streams
# going to the same listener

{% set listener = "02:00:00:00:00:03" %}

stream 1
 dmac {{ listener }}
stream 2
 dmac {{ listener }}

interface {{ ports[0].name }}
 stream-id 1
interface {{ ports[1].name }}
 stream-id 2

tsn stream gate 1
 cycle-time 1 ms
 control-list-length 3
 control-list index 0 gate-state closed time-interval 250 us
 control-list index 1 gate-state open time-interval 25 us
 control-list index 2 gate-state closed time-interval 725 us
 enable
 config-change
tsn stream gate 2
 cycle-time 1 ms
 control-list-length 3
 control-list index 0 gate-state closed time-interval 500 us
 control-list index 1 gate-state open time-interval 25 us
 control-list index 2 gate-state closed time-interval 475 us
 enable
 config-change

tsn stream filter 1
 stream-id 1
 gate id 1
 max-sdu 1536
tsn stream filter 2
 stream-id 2
 gate id 2
 max-sdu 1536
