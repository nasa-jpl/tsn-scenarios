{% include "base.cfg" %}
{% include "802.1AS.cfg" %}

# This configuration implements 802.1Qci (PSFP stream gating) using
# the source MAC address for stream identification with two streams
# going to the same listener

{% set talker1 = "00:13:01:00:00:01" %}
{% set talker2 = "00:15:01:00:00:01" %}
!{% set listener = "00:12:01:00:00:01" %}

stream 1
 smac {{talker1}}
! dmac {{listener}}
!
stream 2
 smac {{talker2}}
! dmac {{listener}}
!
{% for port in ports[0:1] %}
interface {{ port.name }}
 stream-id 1
{% endfor %}
!
{% for port in ports[1:2] %}
interface {{ port.name }}
 stream-id 2
{% endfor %}
!
tsn stream gate 1
 ipv 1
 close-due-to-invalid-rx-enable
 cycle-time 1 ms
 control-list-length 3
 control-list index 0 gate-state closed time-interval 250 us ipv 1
 control-list index 1 gate-state open time-interval 25 us ipv 2
 control-list index 2 gate-state closed time-interval 725 us ipv 1
 enable
 config-change
!
tsn stream gate 2
 ipv 2
 close-due-to-invalid-rx-enable
 cycle-time 1 ms
 control-list-length 3
 control-list index 0 gate-state closed time-interval 500 us ipv 2
 control-list index 1 gate-state open time-interval 25 us ipv 3
 control-list index 2 gate-state closed time-interval 475 us ipv 2
 enable
 config-change
!
tsn stream filter 1
 stream-id 1
 gate id 1
 max-sdu 1536
!
tsn stream filter 2
 stream-id 2
 gate id 2
 max-sdu 1536
!
!end
