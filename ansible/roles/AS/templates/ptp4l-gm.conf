[global]
# From: https://github.com/richardcochran/linuxptp/blob/v4.4/configs/gPTP.cfg
gmCapable 1
priority1 248
priority2 248
logAnnounceInterval 0
logSyncInterval -3
syncReceiptTimeout 3
neighborPropDelayThresh 800
min_neighbor_prop_delay -20000000
assume_two_step 1
path_trace_enabled 1
follow_up_info 1
transportSpecific 0x1
ptp_dst_mac 01:80:C2:00:00:0E
network_transport L2
delay_mechanism P2P

# Disable the Best TimeTransmitter Clock Algorithm (BTCA)
BMCA noop
# TimeTransmitter only
serverOnly 1
# Priority for BTCA
# Lower value is higher priority
# Make lower than default (128) so that any nodes doing BTCA (e.g., switch) select this node as Grandmaster
priority1 0
priority2 0

[{{ tsn_interface }}]
